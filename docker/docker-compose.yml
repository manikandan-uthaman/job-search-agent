services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nordic-job-agent-db
    environment:
      POSTGRES_DB: nordicjobagent
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: